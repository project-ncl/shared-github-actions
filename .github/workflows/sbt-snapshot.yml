name: Build snapshot version and upload to registry

on:
  workflow_call:
    inputs:
      project_name:
        description: "Name in <organisation>/<project_name> format. Prevents forks to run the job"
        required: true
        type: string
      fetch_all_commits:
        description: "Whether to fetch all commits. Default: false"
        required: false
        type: boolean
        default: false
      java_version:
        description: "The Java version to use to compile. Default: 8"
        required: false
        type: string
        default: "8"
      resolvers:
        description: "SBT resolvers to configure"
        required: false
        type: string
        default: |
          resolvers ++= Seq(
              "Sonatype Snapshots" at "https://central.sonatype.com/repository/maven-snapshots",
              "Artima" at "https://repo.artima.com/releases",
              "MRRC" at "https://maven.repository.redhat.com/ga/"
          )
      build_args:
        description: "Args for SBT tool. Default: clean; compile; +test"
        required: false
        type: string
        default: "clean; compile; +test"
      snapshot_realm:
        description: "Realm of the snapshot repository. Default: Sonatype Nexus Repository Manager"
        required: false
        type: string
        default: "Sonatype Nexus Repository Manager"
      snapshot_host:
        description: "Host of the snapshot repository. Default: central.sonatype.com"
        required: false
        type: string
        default: "central.sonatype.com"
      snapshot_deploy_command:
        description: "The snapshot command to use. Default: sbt -v publish"
        required: false
        type: string
        default: "sbt -v publish"

    secrets:
      SNAPSHOT_USER:
        required: true
      SNAPSHOT_PASSWORD:
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.repository == inputs.project_name
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: ${{ inputs.fetch_all_commits == true && '0' || '1' }}
          persist-credentials: false

      - uses: project-ncl/shared-github-actions/.github/actions/sbt-build@0fd979fcdd90cf1b62e6410221d64efd6b470865 # v0.0.21
        with:
          java_version: ${{ inputs.java_version }}
          resolvers: ${{ inputs.resolvers }}
          build_args: ${{ inputs.build_args }}

      - name: Publish snapshot
        shell: bash
        env:
          SNAPSHOT_USER: ${{ secrets.SNAPSHOT_USER }}
          SNAPSHOT_PASSWORD: ${{ secrets.SNAPSHOT_PASSWORD }}
          SNAPSHOT_REALM: ${{ inputs.snapshot_realm }}
          SNAPSHOT_HOST: ${{ inputs.snapshot_host }}
          SNAPSHOT_DEPLOY_COMMAND: ${{ inputs.snapshot_deploy_command }}
        run: |
          mkdir -p "$HOME/.sbt"
          printf '%s\n' \
          "realm=$SNAPSHOT_REALM" \
          "host=$SNAPSHOT_HOST" \
          "user=$SNAPSHOT_USER" \
          "password=$SNAPSHOT_PASSWORD" > "$HOME/.sbt/.credentials"
          bash -c "$SNAPSHOT_DEPLOY_COMMAND" < /dev/null
