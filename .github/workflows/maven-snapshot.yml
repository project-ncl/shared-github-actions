name: Build snapshot version and upload to Maven Central

on:
  workflow_call:
    # Map the inputs that the caller needs to provide
    inputs:
      project_name:
        description: 'Name in <organisation>/<project_name> format. Prevents forks to run the job'
        required: true
        type: string
      java_version:
        description: 'The Java version to use to compile. Default: 21'
        required: false
        type: string
        default: '21' # Java 21 is the default
      snapshot_deploy_command:
        description: 'The snapshot command to use. Default: mvn'
        required: false
        type: string
        default: 'mvn -B -V deploy'
      fetch_all_commits:
        description: 'Whether to fetch all commits. Default: false'
        required: false
        type: boolean
        default: false
      quarkus_jib_image:
        description: 'Whether to perform a Quarkus JIB image build and push. Default: false'
        required: false
        type: boolean
        default: false
      jboss_parent_override:
        description: "Overrides for JBoss-Parent Central Profile"
        required: false
        type: string
        # central.serverId : We use 'central-publisher' not 'central'
        # central-sonatype.url: Due to https://github.com/jboss/jboss-parent-pom/issues/540 we need to override the URL
        # This also activates the central-release profile to use the correct plugins and skips gpg tagging.
        default: '-Dcentral.serverId=central-publisher -Dcentral.sonatype.url=https://central.sonatype.com/repository/maven-snapshots -Pcentral-release -Dgpg.skip'

    secrets:
      SONATYPE_USERNAME:
        required: true
      SONATYPE_PASSWORD:
        required: true
      QUAY_DEVEL_USERNAME:
        # Quay.io username for image push
        required: false
      QUAY_DEVEL_PASSWORD:
        # Quay.io password for image push
        required: false

# cancel in-progress runs of the same workflow
# to avoid unnecessary runs when multiple commits pushed
# in a short period of time
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  snapshot:
    # only run for this repository and not on forked ones
    if: github.repository == inputs.project_name
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: ${{ inputs.fetch_all_commits == true && '0' || '1' }}
        persist-credentials: false

    - name: Set up JDK '${{ inputs.java_version }}'
      uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
      with:
        java-version: '${{ inputs.java_version }}'  # java version to use
        distribution: 'temurin'
        cache: maven                      # use cache for speed
        server-id: central-publisher      # we use this in our pom.xml
        server-username: MAVEN_USERNAME   # env var name for username
        server-password:  MAVEN_PASSWORD  # env var name for password

    - name: Extract Project version
      id: project-version
      run: echo "version=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> "$GITHUB_OUTPUT"

    - name: Deploy Snapshot
      # Only run for snapshot version and not for commits with released versions
      if: endsWith(steps.project-version.outputs.version, '-SNAPSHOT')
      run: >
        bash -c "${INPUTS_SNAPSHOT_DEPLOY_COMMAND} ${{ inputs.quarkus_jib_image && '-Dquarkus.container-image.build=true -Dquarkus.container-image.push=true' || '' }}"
      env:
        MAVEN_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
        MAVEN_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
        QUARKUS_CONTAINER_IMAGE_USERNAME: ${{ secrets.QUAY_DEVEL_USERNAME }}
        QUARKUS_CONTAINER_IMAGE_PASSWORD: ${{ secrets.QUAY_DEVEL_PASSWORD }}
        INPUTS_SNAPSHOT_DEPLOY_COMMAND: ${{ inputs.snapshot_deploy_command }} ${{ inputs.jboss_parent_override }}
