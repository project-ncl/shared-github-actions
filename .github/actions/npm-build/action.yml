name: "NPM build"
description: "Set up Node and NPM, and build the project"

inputs:
  node_version:
    description: "The Node.js version to use. Default: 22.x"
    required: false
    default: "22.x"
  build_command:
    description: "The build command to use. Default: npm ci and npm run build"
    required: false
    default: "npm ci && npm run build"

runs:
  using: "composite"
  steps:
    - name: Set up Node.js ${{ inputs.node_version }}
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node_version }}

    - name: Check Node.js and NPM versions
      shell: bash
      run: node --version && npm --version

    - name: Update NPM
      shell: bash
      run: |
        # workaround https://github.com/npm/cli/issues/9151
        npm install -g npm@11.11.1
        npm install -g npm@^11.0.0

    - name: Check NPM version after update
      shell: bash
      run: npm --version

    - name: Build with NPM
      shell: bash
      env:
        INPUTS_BUILD_COMMAND: ${{ inputs.build_command }}
      run: bash -c "${INPUTS_BUILD_COMMAND}"
