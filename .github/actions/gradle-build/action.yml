name: "Java Gradle build"
description: "Set up Java and Gradle, and build the project"

inputs:
  java_version:
    description: "The Java version to use to compile. Default: 17"
    required: false
    default: "17"
  gradle_version:
    description: "The Gradle version to use, or 'wrapper'. Default: wrapper"
    required: false
    default: "wrapper"
  build_args:
    description: "Args for gradle build"
    required: true

runs:
  using: "composite"
  steps:
    - name: Set up JDK '${{ inputs.java_version }}'
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: "${{ inputs.java_version }}"
        distribution: "temurin"

    - name: Set up Gradle '${{ inputs.gradle_version }}'
      uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
      with:
        gradle-version: "${{ inputs.gradle_version }}"

    - name: Build with Gradle
      shell: bash
      env:
        INPUTS_BUILD_ARGS: ${{ inputs.build_args }}
        INPUTS_GRADLE_VERSION: ${{ inputs.gradle_version }}
      run: |
        if [[ "${INPUTS_GRADLE_VERSION}" == "wrapper" ]]; then
          ./gradlew ${INPUTS_BUILD_ARGS}
        else
          gradle ${INPUTS_BUILD_ARGS}
        fi
